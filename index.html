  <!-- ③ CSS（style） -->
  <style>
  /* ===============================
     レイアウト・共通スタイル
     =============================== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
  }

  .app {
    padding: 1.25rem 1.5rem !important;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }

  .topbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.5rem;
    width: 100%;
  }

  input[type=text] {
    height: 36px;
    padding: 0 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    font-size: 14px;
    outline: none;
  }
  input[type=text]:focus { border-color: #D4537E; }

  select {
    height: 36px;
    padding: 0 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    font-size: 14px;
    cursor: pointer;
  }

  .btn {
    height: 36px;
    padding: 0 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: #f0f0f0; }

  .btn-accent {
    background: #D4537E;
    color: #fff;
    border-color: #D4537E;
  }
  .btn-accent:hover { background: #993556; }

  .btn-sm {
    height: 28px;
    padding: 0 10px;
    font-size: 12px;
  }

  .toolbar-right {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: auto;
    flex-shrink: 0;
  }

  .fav-filter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 14px;
    color: #888;
    cursor: pointer;
    height: 36px;
    padding: 0 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
  }
  .fav-filter:hover { background: #f0f0f0; }

  .count-bar {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
  }

  /* ===============================
     レシピカード
     =============================== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    justify-content: center;
    width: 100%;
  }

  .card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color .15s;
  }
  .card:hover { border-color: #aaa; }

  .card-img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
    background: #f5f5f5;
  }
  .card-img-placeholder {
    width: 100%;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: #FBEAF0;
  }

  .card-body { padding: 10px 12px; }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 4px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.4;
    flex: 1;
  }

  .hearts {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .heart-btn,
  .star-btn,
  .crown-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 26px;
    padding: 0;
    line-height: 1;
    color: #ccc;
    width: 28px;
    text-align: center;
    display: inline-block;
  }
  .heart-btn.on { color: #D4537E; font-size: 37px; }  /* ♥のフォント調整 */
  .star-btn.on { color: #BA7517; }
  .crown-btn.on {
    color: #FFD700;
    text-shadow: 0 0 5px rgba(255,215,0,0.3);
  }

  .card-desc {
    font-size: 12px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 4px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 400;
    border: none;
  }
  .t-cat  { background:#FBEAF0; color:#72243E; }
  .t-ing  { background:#FAEEDA; color:#633806; }
  .t-pub  { background:#EAF3DE; color:#27500A; }
  .t-priv { background:#F1EFE8; color:#5F5E5A; }

  /* ===============================
     モーダル・オーバーレイ
     =============================== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    z-index: 1000;
    overflow-y: auto;
  }
  .overlay.open { display: block; }

  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 1.5rem;
    max-width: 720px;
    margin: 40px auto;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #999;
  }

  .modal-btns {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }
  .modal-btns-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* ===============================
     詳細表示・材料・写真
     =============================== */
  .detail-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }
  .detail-top h2 {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
  }

  .detail-section {
    margin-bottom: 1.1rem;
  }
  .detail-section h3 {
    font-size: 12px;
    color: #72243E;
    margin-bottom: 6px;
    font-weight: 500;
    background: #FBEAF0;
    padding: 4px 10px;
    border-radius: 5px;
    display: inline-block;
  }

  .yield-badge {
    font-size: 11px;
    color: #555;
    background: #f5f5f5;
    padding: 3px 8px;
    border-radius: 999px;
  }

  .photo-gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
  }
  .photo-gallery-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .photo-gallery-item img {
    width: 100px;
    height: 78px;
    border-radius: 8px;
    object-fit: cover;
    cursor: pointer;
    border: 1px solid #eee;
    transition: opacity .15s;
  }
  .photo-gallery-caption {
    font-size: 11px;
    color: #666;
  }

  /* ===============================
     ライトボックス
     =============================== */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    z-index: 2000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
  }
  .lightbox-caption {
    margin-top: 8px;
    font-size: 13px;
    color: #fff;
  }
  .lightbox-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
  }

  /* ===============================
     共通チップス
     =============================== */
  .note-card {
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 12px;
    background: #fff;
    border: 1px solid #eee;
  }
  .note-recipe {
    border-left: 3px solid #D4537E;
  }
  .note-title {
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .note-image {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin: 6px 0;
  }

  /* ===============================
     材料編集（ingParts）
     =============================== */
  .ing-part {
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 8px;
    background: #fafafa;
  }
  .ing-part-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .drag-handle {
    cursor: grab;
    font-size: 14px;
    color: #999;
  }
  .ing-part-label-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .ing-part-name {
    flex: 1;
    font-size: 12px;
    padding: 4px 6px;
  }
  .btn-del-part {
    background: none;
    border: none;
    color: #D4537E;
    cursor: pointer;
    font-size: 12px;
  }
  .ing-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  /* ===============================
     余白調整
		① tdのpadding（いちばん影響大）
		.ing-table td {
		  padding: 5px 8px;
		}

		上下：5px
		左右：8px
     =============================== */
  .ing-table th {
    font-size: 11px;
    color: #555;
    font-weight: 700;
    padding: 2px 1px;
    border-bottom: 2px solid #ddd;
    text-align: left;
  }
  .ing-table td {
    padding: 2px 1px;
    border-bottom: 1px solid #f5f5f5;
    vertical-align: top;
  }
  .btn-add-row {
    margin-top: 4px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
  }
  .btn-move-row,
  .btn-del-row {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
  }
  .ing-name-linked {
    border-color: #638C3E !important;
    background: #f5fbf2;
  }

  /* ===============================
     写真編集
     =============================== */
  .photo-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .photo-thumb {
    width: 60px;
    height: 46px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #ddd;
  }
  .photo-title-input {
    flex: 1;
    font-size: 12px;
    padding: 4px 6px;
  }
  .photo-cover-label {
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .btn-del-photo {
    background: none;
    border: none;
    color: #D4537E;
    cursor: pointer;
    font-size: 12px;
  }

  /* ツールバーボタン色 */
  .btn-toolbar {
    background: #F9EEF3;
    color: #72243E;
    border-color: #E8BFD0;
  }
  .btn-toolbar:hover { background: #F2D5E3; }

  /* ♡★♚マークフィルターボタン */
  .mark-filter-btn {
    font-size: 16px;
    width: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    background: #fff;
    border: 1px solid #ddd;
    transition: all .15s;
  }
  .mark-filter-btn.active-heart       { color: #D4537E; border-color: #D4537E; background: #FDF0F4; }
  .mark-filter-btn.active-star        { color: #BA7517; border-color: #BA7517; background: #FDF6E8; }
  .mark-filter-btn.active-crown       { color: #B8960A; border-color: #B8960A; background: #FDFBE8; }
  .mark-filter-btn.active-confirmed   { color: #2E7D32; border-color: #2E7D32; background: #E8F5E9; }
  .mark-filter-btn.active-unconfirmed { color: #888;    border-color: #888;    background: #F5F5F5; }
  .mark-filter-btn.active-tips        { color: #638C3E; border-color: #638C3E; background: #EAF3DE; }

  /* レシピカードの縁取り：プレースホルダーより少し濃いピンク */
  .card {
    border: 3px solid #DDA0BC;
  }
  .card:hover { border-color: #C97094; }

  /* Tipsカードの縁取り：プレースホルダーより少し濃い緑＋薄緑背景 */
  .card-tips {
    border: 3px solid #76A845 !important;
    background: #D8ECC8 !important;  //#DFF0CE
  }
  .card-tips:hover { border-color: #5A8A2A !important; background: #D0E8BA !important; }

  /* 閲覧モードでは editor-only を非表示 */
  body:not(.edit-mode) .editor-only { display: none !important; }

  /* レシピリンク記法 [[レシピ名]] */
  .recipe-link {
    color: #185FA5;
    border-bottom: 1px solid #185FA5;
    cursor: pointer;
    font-style: normal;
  }
  .recipe-link:hover {
    color: #0D3F7A;
    background: #EEF4FB;
    border-radius: 2px;
  }

  /* ツールチップ記法 [テキスト](補足) */
  .tooltip-word {
    border-bottom: 1px dashed #D4537E;
    color: #993556;
    cursor: help;
    font-style: normal;
  }

  /* active states for confirmed filter */
  .mark-filter-btn.active-confirmed   { color: #2E7D32; border-color: #2E7D32; background: #E8F5E9; }
  .mark-filter-btn.active-unconfirmed { color: #888;    border-color: #888;    background: #F5F5F5; }
  .mark-filter-btn.active-tips        { color: #638C3E; border-color: #638C3E; background: #EAF3DE; }

  /* オフライン保存バッジ */
  .offline-saved-badge {
    display: inline-block;
    background: #FFF8E1;
    border: 1px solid #FFD54F;
    color: #7B5800;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 999px;
  }

  /* 配合確定バッジ */
  .badge-confirmed {
    display: inline-block;
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 999px;
    background: #E8F5E9;
    color: #2E7D32;
    border: 1px solid #A5D6A7;
    vertical-align: middle;
    white-space: nowrap;
  }
  .btn-confirmed {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid #ccc;
    background: #f5f5f5;
    color: #888;
    cursor: pointer;
  }
  .btn-confirmed.on {
    background: #E8F5E9;
    color: #2E7D32;
    border-color: #A5D6A7;
    font-weight: 600;
  }

  /* グリッド ↔ リスト 切り替えボタン */
  .btn-view-active {
    background: #D4537E !important;
    color: #fff !important;
    border-color: #D4537E !important;
  }

  /* リスト表示 */
  .list-view { display: flex; flex-direction: column; width: 100%; }
  .list-header,
  .list-row {
    display: grid;
    grid-template-columns: 48px 1fr 44px 100px 90px 76px 80px;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
  }
  .list-header {
    font-size: 11px; font-weight: 700; color: #72243E;
    background: #FBEAF0; border-radius: 8px;
    margin-bottom: 4px; position: sticky; top: 0; z-index: 10;
  }
  .list-row {
    background: #fff; border: 1px solid #eee;
    border-radius: 8px; margin-bottom: 4px;
    cursor: pointer; transition: border-color .15s;
  }
  .list-row:hover { border-color: #C97094; }
  .list-thumb {
    width: 44px; height: 34px; object-fit: cover;
    border-radius: 5px; border: 1px solid #ddd; display: block;
  }
  .list-thumb-placeholder {
    width: 44px; height: 34px; display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; background: #FBEAF0; border-radius: 5px;
  }
  .list-name { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .list-desc { font-size: 11px; color: #888; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sortable { cursor: pointer; user-select: none; }
  .sortable:hover { color: #993556; }
  .sort-icon { font-size: 10px; }

  @media (max-width: 600px) {
    .list-header, .list-row { grid-template-columns: 40px 1fr 72px 60px; }
    .list-col-genre, .list-col-date, .list-col-pub { display: none; }
  }

  /* ===============================
     レスポンシブ調整
     =============================== */
  @media (max-width: 600px) {
    .app { padding: 1rem; }
    .modal { margin: 20px 10px; padding: 1.1rem; }
    .detail-top h2 { font-size: 18px; }
  }
  </style>
  
</head>
<body>
  <div class="app">
    <div class="topbar">
      <input type="text" id="search" placeholder="キーワード検索">
      <select id="filterCat">
        <option value="">カテゴリ：すべて</option>
      </select>
      <select id="filterPub" class="editor-only">
        <option value="" selected>公開：すべて</option>
        <option value="1">公開のみ</option>
        <option value="0">非公開のみ</option>
      </select>

      <!-- ♡★👑✅💡 絞り込みボタン（編集モードのみ） -->
      <div class="toolbar-mark-filters editor-only" style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn btn-sm mark-filter-btn" id="filterHeart" title="♡ お気に入りのみ" onclick="toggleMarkFilter('heart')">♡</button>
        <button class="btn btn-sm mark-filter-btn" id="filterStar"  title="★ スターのみ"     onclick="toggleMarkFilter('star')">★</button>
        <button class="btn btn-sm mark-filter-btn" id="filterCrown" title="👑 クラウンのみ"   onclick="toggleMarkFilter('crown')">♚</button>
        <button class="btn btn-sm mark-filter-btn" id="filterConfirmed" title="クリックで確定のみ表示"
          onclick="toggleConfirmedFilter()" style="width:auto;padding:0 8px;font-size:12px">✅</button>
        <button class="btn btn-sm mark-filter-btn" id="filterTipsOnly" title="チップスのみ表示"
          onclick="toggleTipsOnly()" style="width:auto;padding:0 8px;font-size:12px">💡のみ</button>
      </div>

      <!-- グリッド / リスト 切り替え -->
      <div style="display:flex;gap:3px;flex-shrink:0">
        <button class="btn btn-sm btn-view-active" id="btnViewGrid" title="グリッド表示" onclick="setViewMode('grid')">⊞</button>
        <button class="btn btn-sm" id="btnViewList" title="リスト表示" onclick="setViewMode('list')">☰</button>
      </div>

      <div class="toolbar-right">
        <button class="btn btn-sm btn-toolbar editor-only" id="btnOpenAdd">＋追加</button>
        <button class="btn btn-sm btn-toolbar editor-only" id="btnOpenCommonTips">💡チップス</button>
        <button class="btn btn-sm btn-toolbar editor-only" id="btnExport">Exp</button>
        <button class="btn btn-sm" id="btnOffline" title="オフライン用にデータを保存">📥</button>
      </div>
    </div>

    <div class="count-bar" id="countBar"></div>
    <div class="grid" id="grid"></div>

    <!-- 共通チップスカードエリア -->
    <div id="tipsArea" style="margin-top:2rem;display:none">
      <div style="font-size:13px;font-weight:600;color:#638C3E;border-bottom:2px solid #638C3E;padding-bottom:6px;margin-bottom:12px">
        💡 共通チップス
      </div>
      <div id="tipsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px"></div>
    </div>
  </div>

  <!-- レシピ詳細モーダル -->
  <div class="overlay" id="overlayDetail">
    <div class="modal">
      <button class="modal-close" onclick="closeOverlay('overlayDetail')">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- レシピ追加/編集モーダル -->
  <div class="overlay" id="overlayAdd">
    <div class="modal">
      <button class="modal-close" onclick="closeOverlay('overlayAdd')">✕</button>
      <h2 id="formTitle" style="font-size:16px;margin-bottom:10px">レシピを追加</h2>

      <div style="display:flex;flex-direction:column;gap:8px">
        <input id="fName" type="text" placeholder="料理名">
        <input id="fYield" type="text" placeholder="出来上がり量（例：18cmタルト1台分）">
        <input id="fDesc" type="text" placeholder="説明（一行）">

        <div style="display:flex;gap:8px">
          <div style="flex:1">
            <input id="fCat" type="text" placeholder="カテゴリ（例：焼き菓子）" list="catList" style="width:100%">
            <datalist id="catList">
              <option value="焼き菓子">
              <option value="おやつ">
              <option value="パート">
              <option value="ヘルシー？">
              <option value="揚げ菓子">
              <option value="パン">
              <option value="冷菓">
              <option value="氷菓">
              <option value="飲み物">
            </datalist>
          </div>
          <div style="flex:1">
            <input id="fGenre" type="text" placeholder="ジャンル（例：タルト）" list="genreList" style="width:100%">
            <datalist id="genreList">
              <option value="フランス">
              <option value="ドイツ">
              <option value="日本">
              <option value="イタリア">
              <option value="アメリカ">
              <option value="アジア">
              <option value="洋菓子">
            </datalist>
          </div>
        </div>

        <input id="fIngs" type="text" placeholder="食材タグ（カンマ区切り）">
        <input id="fUrl" type="text" placeholder="参考レシピURL">
        <input id="fUrlLabel" type="text" placeholder="参考レシピの表示ラベル（省略可）">

        <div id="ingParts"></div>
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <button type="button" class="btn btn-sm" id="btnAddPart">＋ パートを追加</button>
        </div>

        <textarea id="fSteps" placeholder="手順　※ [表示テキスト](補足説明) でツールチップが使えます" style="height:120px;padding:8px 10px"></textarea>
        <textarea id="fMemo" placeholder="アレンジ・覚書　※ [表示テキスト](補足説明) でツールチップが使えます" style="height:80px;padding:8px 10px"></textarea>

        <div>
          <div id="photoList"></div>
          <button type="button" class="btn btn-sm" id="btnAddPhoto">📷 写真を追加</button>
          <input type="file" id="photoInput" accept="image/*" style="display:none">
        </div>

        <!-- レシピメモ -->
        <div style="margin-top:8px;border:1px solid #eee;border-radius:10px;padding:10px">
          <div style="font-size:13px;font-weight:600;color:#72243E;margin-bottom:8px">📝 レシピメモ</div>
          <div id="editNoteList" style="max-height:160px;overflow-y:auto;margin-bottom:8px"></div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <input type="text" id="noteTitle" placeholder="メモのタイトル">
            <textarea id="noteContent" placeholder="メモ内容" style="height:60px;padding:8px 10px"></textarea>
            <button type="button" class="btn btn-sm" id="btnAddNote" style="align-self:flex-start">＋ メモを追加</button>
          </div>
        </div>
      </div>

      <div class="modal-btns" style="margin-top:12px">
        <button class="btn btn-sm" id="btnDelete" style="display:none;color:#D4537E;border-color:#D4537E">削除</button>
        <div class="modal-btns-right" style="align-items:center;margin-left:auto">
          <label style="font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer;margin-right:4px">
            <input type="checkbox" id="fPub"> 公開する
          </label>
          <button class="btn btn-sm" onclick="closeOverlay('overlayAdd')">キャンセル</button>
          <button class="btn btn-sm btn-accent" id="btnSave">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- チップス詳細モーダル -->
  <div class="overlay" id="overlayTipDetail">
    <div class="modal" style="max-width:480px">
      <button class="modal-close" onclick="closeOverlay('overlayTipDetail')">✕</button>
      <div id="tipDetailContent"></div>
    </div>
  </div>

  <!-- チップス編集モーダル -->
  <div class="overlay" id="overlayTipEdit">
    <div class="modal" style="max-width:480px">
      <button class="modal-close" onclick="closeOverlay('overlayTipEdit')">✕</button>
      <h2 style="font-size:16px;margin-bottom:14px;color:#638C3E;border-bottom:2px solid #638C3E;padding-bottom:8px">💡 チップス編集</h2>
      <input type="hidden" id="tipEditId">
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="text" id="tipEditTitle" placeholder="タイトル">
        <textarea id="tipEditContent" placeholder="内容（Markdown 可）" style="height:100px"></textarea>
        <label style="font-size:13px;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="tipEditPub"> 公開する
        </label>

        <!-- 写真（複数枚） -->
        <div style="border:1px solid #eee;border-radius:8px;padding:8px">
          <div style="font-size:12px;font-weight:600;color:#555;margin-bottom:6px">📷 写真</div>
          <div id="tipEditPhotoList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px"></div>
          <button type="button" class="btn btn-sm" id="tipEditPhotoAddBtn">＋ 写真を追加</button>
        </div>
        <input type="file" id="tipEditPhotoInput" accept="image/*" style="display:none">
      </div>

      <div class="modal-btns" style="margin-top:14px">
        <button class="btn btn-sm" id="tipEditDeleteBtn" style="color:#D4537E;border-color:#D4537E">削除</button>
        <div class="modal-btns-right">
          <button class="btn btn-sm" onclick="closeOverlay('overlayTipEdit')">キャンセル</button>
          <button class="btn btn-sm btn-accent" id="tipEditSaveBtn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- オフライン保存モーダル -->
  <div class="overlay" id="overlayOffline">
    <div class="modal" style="max-width:420px">
      <button class="modal-close" onclick="closeOverlay('overlayOffline')">✕</button>
      <h2 style="font-size:16px;margin-bottom:10px">📥 オフライン保存</h2>
      <p style="font-size:13px;color:#555;line-height:1.7;margin-bottom:14px">
        ボタンを押すと、今のレシピデータをこのスマホに保存します。<br>
        次回ネットがない場所でも、保存したときのデータを見ることができます。<br>
        <span style="font-size:12px;color:#999">※ 写真はWi-Fi環境でのみ表示されます。</span>
      </p>
      <div id="offlineStatus" style="margin-bottom:14px"></div>

      <!-- ホーム画面に追加ボタン（インストール可能な時だけ表示） -->
      <div id="btnInstallApp" style="display:none;margin-bottom:14px">
        <button class="btn btn-sm" onclick="execInstallApp()"
          style="background:#4CAF50;color:#fff;border-color:#4CAF50;width:100%;height:36px;font-size:13px">
          📲 ホーム画面に追加する
        </button>
        <p style="font-size:11px;color:#888;margin-top:4px">アプリとしてインストールするとオフラインでも快適に使えます。</p>
      </div>

      <div class="modal-btns">
        <div></div>
        <div class="modal-btns-right">
          <button class="btn btn-sm" onclick="closeOverlay('overlayOffline')">閉じる</button>
          <button class="btn btn-sm btn-accent" id="offlineSaveBtn">保存する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ライトボックス -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <!-- 共通チップス管理モーダル -->
  <div class="overlay" id="overlayCommonTips">
    <div class="modal" style="max-width:480px;margin:auto">
      <button class="modal-close" onclick="closeOverlay('overlayCommonTips')">✕</button>
      <h2 style="color:#638C3E;font-size:16px;border-bottom:2px solid #638C3E;padding-bottom:8px;margin-bottom:14px">
        💡 共通チップス管理
      </h2>
      <div style="background:#f9fbf7;padding:14px;border-radius:8px;border:1px solid #e0e6d8">
        <input type="text" id="commonTipTitle" placeholder="チップスのタイトル" style="width:100%;margin-bottom:8px">
        <div id="commonTipPhotoPreview"></div>
        <button type="button" class="btn btn-sm" id="commonTipPhotoAddBtn" style="margin-bottom:8px">
          📷 写真を追加（任意）
        </button>
        <input type="file" id="commonTipPhotoInput" accept="image/*" style="display:none">
        <textarea id="commonTipContent" placeholder="内容..." style="width:100%;height:140px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;margin-bottom:10px;outline:none"></textarea>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <label style="font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" id="commonTipPub"> 公開する
          </label>
          <button type="button" id="commonTipAddBtn" class="btn btn-sm" style="background:#638C3E;color:white;border-color:#638C3E;flex:1">
            共通チップスを追加
          </button>
        </div>
      </div>
      <div id="commonTipList"></div>
      <div class="modal-btns" style="margin-top:12px">
        <div></div>
        <button class="btn btn-sm" onclick="closeOverlay('overlayCommonTips')">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 外部 JS 読み込み（依存順） -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/recipe_edit.js"></script>
  <script src="js/tips.js"></script>
  <script src="js/recipes.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
