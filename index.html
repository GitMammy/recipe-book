<!DOCTYPE html>
<html lang="ja">
  <!—260401-1544　参考レシピ/出来上がり量/説明ラベル非表示/閲覧モード調整　-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍪 おかしなぺぇじ 🥐</title>
<link rel="icon" href="favicon.ico" id="faviconLink">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#fafafa;color:#1a1a1a}

.app {
  padding: 1.25rem 1.5rem !important;
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
}

.topbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 1.5rem;
  width: 100%;
}

input[type=text]{height:36px;padding:0 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;outline:none}
input[type=text]:focus{border-color:#D4537E}
select{height:36px;padding:0 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer}
.btn{height:36px;padding:0 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn-accent{background:#D4537E;color:#fff;border-color:#D4537E}
.btn-accent:hover{background:#993556}
.btn-sm{height:28px;padding:0 10px;font-size:12px}

.toolbar-right {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

.fav-filter {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 14px;
  color: #888;
  cursor: pointer;
  height: 36px;
  padding: 0 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;
  width: fit-content;
  min-width: 0 !important;
}
.fav-filter:hover{background:#f0f0f0}
.count-bar{font-size:13px;color:#888;margin-bottom:10px}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  justify-content: center;
  width: 100%;
}

.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#aaa}
.card-img{width:100%;height:130px;object-fit:cover;display:block;background:#f5f5f5}
.card-img-placeholder{width:100%;height:130px;display:flex;align-items:center;justify-content:center;font-size:32px;background:#FBEAF0}
.card-body{padding:10px 12px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px}
.card-title{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.4;flex:1}
.hearts{display:flex;gap:2px;flex-shrink:0}
.heart-btn,.star-btn{background:none;border:none;cursor:pointer;font-size:26px;padding:0;line-height:1;color:#ccc}
.heart-btn.on{color:#D4537E}
.star-btn.on{color:#BA7517}
.card-desc{font-size:12px;color:#666;margin-bottom:8px;line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.tag{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:400;border:none}
.t-cat{background:#FBEAF0;color:#72243E}
.t-ing{background:#FAEEDA;color:#633806}
.t-pub{background:#EAF3DE;color:#27500A}
.t-priv{background:#F1EFE8;color:#5F5E5A}
.card-footer{font-size:11px;color:#aaa}
.empty{text-align:center;padding:3rem;color:#888;font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:1.5rem;width:100%;max-width:540px;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:#888;line-height:1}
.modal-close:hover{color:#1a1a1a}
.modal h2{font-size:17px;font-weight:500;margin-bottom:1.25rem;padding-right:24px}
.field{margin-bottom:0.9rem}
.field label{display:block;font-size:12px;color:#666;margin-bottom:3px;font-weight:500}
.field input[type=text],.field textarea{width:100%}
.field textarea{resize:vertical;padding:8px 10px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;line-height:1.6;outline:none}
.field textarea:focus{border-color:#D4537E}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}
.modal-btns{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;gap:8px}
.modal-btns-right{display:flex;gap:8px}
.detail-section{margin-bottom:1rem}
.detail-section h3{font-size:12px;color:#72243E;margin-bottom:6px;font-weight:500;background:#FBEAF0;padding:4px 8px;border-radius:5px}
.detail-section p{font-size:13px;color:#1a1a1a;line-height:1.7;white-space:pre-wrap}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.detail-top h2{font-size:18px;font-weight:500;flex:1}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.pub-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#1a1a1a}
.ing-table{width:100%;border-collapse:collapse;font-size:13px}
.ing-table th{font-size:11px;color:#555;font-weight:700;padding:4px 6px;border-bottom:2px solid #ddd;text-align:left}
.ing-table td{padding:3px 4px;vertical-align:middle}
.ing-table td input{height:30px;padding:0 6px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;width:100%;outline:none}
.ing-table td input:focus{border-color:#D4537E}
.col-name{width:35%}.col-amt{width:23%}.col-note{width:auto}.col-del{width:24px}.col-move{width:28px}
.btn-del-row{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;line-height:1;padding:0 2px}
.btn-del-row:hover{color:#E24B4A}
.btn-move-row{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;line-height:1.1;padding:0;display:block;width:14px;text-align:center}
.btn-move-row:hover{color:#888}
.photo-cover-label{display:flex;align-items:center;gap:3px;font-size:11px;color:#888;white-space:nowrap;cursor:pointer}
.photo-cover-label input{width:auto;height:auto;cursor:pointer}
.btn-add-row{height:26px;padding:0 10px;font-size:12px;border:1px dashed #D4537E;border-radius:6px;background:#fff;color:#D4537E;cursor:pointer;margin-top:5px}
.btn-add-row:hover{background:#FBEAF0}
.btn-add-part{height:26px;padding:0 10px;font-size:12px;border:1px dashed #aaa;border-radius:6px;background:#fff;color:#888;cursor:pointer;margin-top:5px;margin-left:6px}
.btn-add-part:hover{background:#f5f5f5}
.ing-part{margin-bottom:10px;border:1px solid #f0e0eb;border-radius:8px;padding:8px 10px;transition:opacity .15s}
.ing-part.drag-over{border-color:#D4537E;background:#fff8fb}
.ing-part-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.drag-handle{cursor:grab;color:#ccc;font-size:15px;flex-shrink:0;line-height:1;user-select:none;padding:0 2px}
.drag-handle:hover{color:#aaa}
.drag-handle:active{cursor:grabbing}
.ing-part-name{height:26px;padding:0 6px;border:1px solid #e8d0dc;border-radius:6px;background:#fff8fb;font-size:13px;font-weight:500;color:#993556;outline:none;flex:1;max-width:200px}
.ing-part-name:focus{border-color:#D4537E}
.ing-part-label-wrap{display:inline-flex;align-items:center;gap:4px;background:#f0e0eb;padding:2px 8px 2px 6px;border-radius:6px}
.ing-part-name::placeholder{color:#ccc;font-weight:400}
.btn-del-part{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;line-height:1;padding:2px 4px;margin-left:auto;border-radius:4px}
.btn-del-part:hover{color:#E24B4A;background:#fff0f0}
.photo-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.photo-item{display:flex;align-items:center;gap:8px;border:1px solid #eee;border-radius:8px;padding:6px 8px;background:#fff}
.photo-thumb{width:52px;height:40px;object-fit:cover;border-radius:5px;flex-shrink:0}
.photo-title-input{flex:1;height:28px;padding:0 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.photo-title-input:focus{border-color:#D4537E}
.btn-del-photo{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0 2px;line-height:1}
.btn-del-photo:hover{color:#E24B4A}
.btn-add-photo{height:28px;padding:0 12px;font-size:12px;border:1px dashed #aaa;border-radius:6px;background:#fff;color:#888;cursor:pointer}
.btn-add-photo:hover{background:#f5f5f5}
.photo-gallery{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.photo-gallery-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.photo-gallery-item img{width:90px;height:70px;border-radius:6px;display:block;object-fit:cover;cursor:pointer;border:1px solid #eee;transition:opacity .15s}
.photo-gallery-item img:hover{opacity:0.8}
.photo-gallery-caption{font-size:11px;color:#888;text-align:center;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:1rem}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox-caption{color:#fff;font-size:13px;text-align:center}
.lightbox-close{position:absolute;top:14px;right:18px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1}

.crown-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 26px;
  padding: 0;
  line-height: 1;
  color: #ccc;
  transition: color 0.2s;
}
.crown-btn.on {
  color: #FFD700;
  text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
}

.related-card {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid #e5e5e5;
  border-radius: 8px;
  padding: 6px 10px;
  background: #fff;
  transition: border-color .15s;
}
.related-card:hover { border-color: #aaa; }
.related-card-thumb { width: 36px; height: 36px; border-radius: 5px; object-fit: cover; flex-shrink: 0; }
.related-card-placeholder { width: 36px; height: 36px; border-radius: 5px; background: #FBEAF0; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.related-card-name { font-size: 13px; color: #1a1a1a; }

.ing-link { color: #185FA5; cursor: pointer; text-decoration: underline; }
.ing-link:hover { color: #0d3d73; }
.ing-name-linked { color: #185FA5 !important; }

/* 出来上がり量バッジ */
.yield-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#72243E;background:#FBEAF0;padding:3px 10px;border-radius:999px;margin-top:4px;margin-bottom:2px}

@media(max-width:600px){
.field-row{flex-direction:column}
.app{padding:1rem 1.25rem}
.topbar{gap:6px}
.topbar input[type=text]{min-width:120px}
.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.card-img,.card-img-placeholder{height:110px}
.modal{padding:1.25rem 1rem;border-radius:10px}
.overlay{padding:0.75rem}
.photo-gallery-item img{width:72px;height:56px}
.photo-gallery-caption{max-width:72px}
.btn,.btn-accent{font-size:13px;padding:0 10px}
.toolbar-right{gap:4px}
}

/* メモ・チップス */
.note-card{margin-top:12px;border-radius:10px;padding:12px;font-size:13.5px;line-height:1.6}
.note-recipe{background-color:#FBEAF0;border:2px solid #D4537E;color:#72243E}
.note-common{background-color:#EAF3DE;border:2px solid #638C3E;color:#27500A}
.note-title{font-weight:bold;margin-bottom:6px;display:flex;align-items:center;gap:5px;border-bottom:1px dashed rgba(0,0,0,0.1);padding-bottom:4px}
.note-image{width:100%;max-height:250px;object-fit:cover;border-radius:6px;margin-bottom:8px;border:1px solid rgba(0,0,0,0.1)}
.tip-content ul{padding-left:1.4em;margin:3px 0}
.tip-content li{margin:1px 0}
.tip-md ul{padding-left:1.4em;margin:4px 0}
.tip-md li{margin:2px 0;line-height:1.6}
.tip-md strong{font-weight:700}

/* カード */
.grid .card{border-width:3px !important;border-style:solid !important;border-radius:12px;overflow:hidden;background:#fff}
.grid .card:not(.card-tip){background-color:#fffafd !important;border-color:#ffb6c1 !important;border-width:3px !important}
.grid .card:not(.card-tip) .card-img{border-bottom:2px solid #ffb6c1}
.grid .card.card-tip{background-color:#f0fff4 !important;border-color:#98fb98 !important;border-width:3px !important;cursor:pointer;min-height:120px;display:flex;flex-direction:column;justify-content:center}
.card-tip .tip-title{color:#2e8b57;font-weight:bold;font-size:14px;margin-bottom:8px}
.card-tip .tip-content{color:#555;font-size:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-tip .tip-img{width:100%;height:120px;object-fit:cover;border-bottom:2px solid #98fb98}

/* オーバーレイ */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.6);display:none;z-index:9999;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem}
.overlay.active,.overlay.open{display:flex !important}

/* チップス詳細 */
.tip-detail-img{width:100%;max-height:300px;object-fit:cover;border-radius:8px;margin-bottom:12px;border:1px solid #e0e6d8}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <input type="text" id="search" placeholder="料理名・食材で検索..." style="flex:1;min-width:150px">
  <select id="filterCat"><option value="">カテゴリ：すべて</option></select>


  <div id="pubFilterArea" style="display:none">
    <select id="filterPub">
      <option value="">公開：すべて</option>
      <option value="1">公開</option>
      <option value="0">非公開</option>
    </select>
  </div>



  <div class="toolbar-right">
    <button class="fav-filter" onclick="toggleFavFilter()">
      <span id="favFilterIcon" style="font-size:15px;color:#ccc">♡</span>
      <span id="favFilterStar" style="font-size:14px;color:#ccc">★</span>
      <span id="favFilterCrown" style="font-size:14px;color:#ccc">♚</span>
    </button>
    <span id="editorTools" style="display:none;gap:6px;align-items:center">
      <button class="btn btn-sm" onclick="openCommonTipsManager()" style="background:#EAF3DE;color:#27500A;border:1px solid #638C3E;">💡 チップス</button>
      <button class="btn" onclick="exportData()">書き出し</button>
      <button class="btn" onclick="document.getElementById('txtFileInput').click()" title="テキストファイルからレシピを追加">📄 TXTから追加</button>
      <input type="file" id="txtFileInput" accept=".txt,text/plain" style="display:none" onchange="openFromTextFile(this)">
      <button class="btn btn-accent" onclick="openAdd()">+ 追加</button>
    </span>
  </div>
</div>
<div class="count-bar" id="countLabel"></div>
<div class="grid" id="grid"></div>
</div>

<!-- レシピ追加・編集 -->
<div class="overlay" id="overlayAdd">
  <div class="modal" style="margin:auto">
    <button class="modal-close" onclick="closeOverlay('overlayAdd')">✕</button>
    <h2 id="formTitle">レシピを追加</h2>
    <div class="field"><label>料理名</label><input type="text" id="fName" placeholder="例：鶏の唐揚げ"></div>
    <div class="field"><label>出来上がり量の目安</label><input type="text" id="fYield" placeholder="例：約20個、直径18cmホール1台分"></div>
    <div class="field"><label>説明</label><input type="text" id="fDesc" placeholder="一言メモ"></div>
    <div class="field-row">
      <div class="field">
        <label>カテゴリ</label>
        <input type="text" id="fCat" list="catList" placeholder="カテゴリを入力または選択">
        <datalist id="catList">
          <option value="焼き菓子"><option value="おやつ"><option value="パート">
          <option value="ヘルシー？"><option value="揚げ菓子"><option value="パン">
          <option value="冷菓"><option value="氷菓"><option value="飲み物">
        </datalist>
      </div>
      <div class="field">
        <label>ジャンル</label>
        <input type="text" id="fGenre" list="genreList" placeholder="ジャンルを入力または選択">
        <datalist id="genreList">
          <option value="フランス"><option value="ドイツ"><option value="日本">
          <option value="イタリア"><option value="アメリカ"><option value="アジア"><option value="洋菓子">
        </datalist>
      </div>
    </div>
    <div class="field"><label>食材タグ（カンマ区切り）</label><input type="text" id="fIngs" placeholder="例：鶏もも肉, にんにく, しょうが"></div>
<div class="field"><label>参考レシピURL（任意）</label>
          <input type="text" id="fUrl" placeholder="https://...">
  	<input type="text" id="fUrlLabel" placeholder="例：辻調おいしいネット">
</div>    <div class="field">
      <label>写真（複数可・タイトル付き）</label>
      <div class="photo-list" id="photoList"></div>
      <button class="btn-add-photo" onclick="document.getElementById('photoFileInput').click()">+ 写真を追加</button>
      <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoAdd(this)">
    </div>
    <div class="field">
      <label>材料</label>
      <div id="ingParts"></div>
      <div style="display:flex;margin-top:6px">
        <button class="btn-add-row" onclick="addRowToLastPart()">+ 行を追加</button>
        <button class="btn-add-part" onclick="addNewPart()">+ パートを追加</button>
      </div>
    </div>
    <div class="field"><label>手順</label><textarea id="fSteps" style="height:100px" placeholder="① 〜&#10;② 〜"></textarea></div>
    <div class="field"><label>アレンジ・覚書</label><textarea id="fMemo" style="height:60px" placeholder="こうするともっと美味しい、など"></textarea></div>
    <div style="margin-top:20px;border-top:2px dashed #eee;padding-top:15px">
      <h4 style="font-size:14px;color:#D4537E;margin-bottom:10px">📝 このレシピのメモを管理</h4>
      <div style="background:#fff5f8;padding:10px;border-radius:8px;border:1px solid #fbdbe5;margin-bottom:10px">
        <input type="text" id="noteTitle" placeholder="メモのタイトル（例：煮詰める時のコツ）" style="width:100%;margin-bottom:5px;padding:6px;font-size:13px;border:1px solid #ddd;border-radius:4px">
        <textarea id="noteContent" placeholder="内容を入力..." style="width:100%;height:60px;padding:6px;font-size:13px;border:1px solid #ddd;border-radius:4px;margin-bottom:5px"></textarea>
        <button type="button" class="btn btn-sm btn-accent" onclick="addNote()" style="width:100%;background:#D4537E">このメモを追加</button>
      </div>
      <div id="editNoteList" style="max-height:150px;overflow-y:auto"></div>
    </div>
    <div class="field"><label class="pub-toggle"><input type="checkbox" id="fPub" style="width:auto"> 公開する</label></div>
    <div class="modal-btns">
      <button class="btn btn-sm btn-danger" id="btnDelete" style="display:none" onclick="deleteRecipe()">削除</button>
      <div class="modal-btns-right">
        <button class="btn btn-sm" onclick="closeOverlay('overlayAdd')">キャンセル</button>
        <button class="btn btn-sm btn-accent" onclick="saveRecipe()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- レシピ詳細 -->
<div class="overlay" id="overlayDetail">
  <div class="modal" style="margin:auto">
    <button class="modal-close" onclick="closeOverlay('overlayDetail')">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- チップス詳細 -->
<div class="overlay" id="overlayTipDetail">
  <div class="modal" style="max-width:480px;margin:auto">
    <button class="modal-close" onclick="closeOverlay('overlayTipDetail')">✕</button>
    <div id="tipDetailContent"></div>
  </div>
</div>

<!-- チップス編集モーダル -->
<div class="overlay" id="overlayTipEdit">
  <div class="modal" style="max-width:480px;margin:auto">
    <button class="modal-close" onclick="closeOverlay('overlayTipEdit')">✕</button>
    <h2 style="color:#2e8b57;font-size:16px;margin-bottom:1.25rem">💡 チップスを編集</h2>
    <input type="hidden" id="tipEditId">
    <div class="field">
      <label>タイトル</label>
      <input type="text" id="tipEditTitle" placeholder="チップスのタイトル" style="width:100%">
    </div>

function markdownToHtml(text) {
  if (!text) return '';

  var lines = text.split('\n');
  var result = [];
  var inUl = false;

  lines.forEach(function(line) {
    var trimmed = line.trim();

    // リスト
    if (/^[・•\-]\s*/.test(trimmed)) {
      if (!inUl) {
        result.push('<ul>');
        inUl = true;
      }
      var content = trimmed.replace(/^[・•\-]\s*/, '');
      result.push('<li>' + applyInlineMarkdown(content) + '</li>');
      return;
    }

    // リスト終了
    if (inUl) {
      result.push('</ul>');
      inUl = false;
    }

    // 空行
    if (trimmed === '') {
      result.push('<br>');
      return;
    }

    // 通常段落
    result.push('<p>' + applyInlineMarkdown(trimmed) + '</p>');
  });

  if (inUl) result.push('</ul>');

  return '<div class="tip-md">' + result.join('') + '</div>';
}

function applyInlineMarkdown(text) {
  if (!text) return '';

  // ① 先にエスケープ（重要）
  text = esc(text);

  // ② Markdown適用
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/`(.+?)`/g,
    '<code style="background:#f0f0f0;padding:0 3px;border-radius:3px;font-size:11px">$1</code>'
  );

  return text;
}

function getFiltered(){
  var q=(document.getElementById('search').value||'').toLowerCase();

  return recipes.filter(function(r){

    // ♡★♚ フィルタ
    if(favFilter==='heart'&&!r.heart)return false;
    if(favFilter==='star'&&!r.fav)return false;
    if(favFilter==='crown'&&!r.crown)return false;

    // カテゴリ
    if(c&&r.cat!==c)return false;

    // ★ 閲覧モードでは公開のみ
    if (!isEditor && !r.pub) return false;

    // ★ 編集モードの公開/非公開フィルタ
    if (p==='1' && !r.pub) return false;
    if (p==='0' && r.pub) return false;

    // 検索
    if(q){
      var hay=(r.name+r.desc+(r.ings||[]).join(' ')).toLowerCase();
      if(hay.indexOf(q)<0)return false;
    }

    return true;
  });
}

function handleTipEditPhoto(input){

      var MAX=1200,w=img.width,h=img.height;

      var canvas=document.createElement('canvas');

      var ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);

  var ab=document.createElement('button');ab.className='btn-add-row';ab.style.fontSize='11px';ab.textContent='+ 行を追加';ab.onclick=function(){addRowToTbody(tbody,'','','');};
  div.appendChild(header);div.appendChild(table);div.appendChild(ab);
  var rowData=rows&&rows.length?rows:[{name:'',amt:'',note:''}];
  rowData.forEach(function(r){addRowToTbody(tbody,r.name,r.amt,r.note);});
  setupPartDrag(div);return div;
}

function setupPartDrag(el){
  el.addEventListener('dragstart',function(e){dragSrc=el;setTimeout(function(){el.style.opacity='0.4';},0);e.dataTransfer.effectAllowed='move';});
  el.addEventListener('dragend',function(){el.style.opacity='';document.querySelectorAll('#ingParts .ing-part').forEach(function(p){p.classList.remove('drag-over');});});
  el.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';if(el!==dragSrc)el.classList.add('drag-over');});
  el.addEventListener('dragleave',function(){el.classList.remove('drag-over');});
  el.addEventListener('drop',function(e){
    e.preventDefault();el.classList.remove('drag-over');if(!dragSrc||dragSrc===el)return;
    var parts=Array.prototype.slice.call(document.getElementById('ingParts').querySelectorAll('.ing-part'));
    var si=parts.indexOf(dragSrc),ti=parts.indexOf(el);
    if(si<ti)el.parentNode.insertBefore(dragSrc,el.nextSibling);else el.parentNode.insertBefore(dragSrc,el);
  });
}

function removePart(btn){

  var bU=document.createElement('button');bU.className='btn-move-row';bU.textContent='▲';bU.title='上へ';bU.onclick=function(){var prev=tr.previousElementSibling;if(prev)tbody.insertBefore(tr,prev);};
  var bD2=document.createElement('button');bD2.className='btn-move-row';bD2.textContent='▼';bD2.title='下へ';bD2.onclick=function(){var next=tr.nextElementSibling;if(next)tbody.insertBefore(next,tr);};

function getIngData(){
  var parts=[];
  document.querySelectorAll('#ingParts .ing-part').forEach(function(partEl){
    var ni=partEl.querySelector('.ing-part-name');var label=ni?ni.value.trim():'';
    var rows=Array.prototype.slice.call(partEl.querySelectorAll('tbody tr')).map(function(tr){
      var ins=tr.querySelectorAll('input');return{name:ins[0].value.trim(),amt:ins[1].value.trim(),note:ins[2].value.trim()};
    }).filter(function(r){return r.name||r.amt;});
    if(rows.length)parts.push({label:label,rows:rows});
  });
  return parts;
}


function setIngData(ingParts, ingRows, ingDetail) {
  var container = document.getElementById('ingParts');
  container.innerHTML = '';

  if (ingParts && ingParts.length > 0) {
    var hasLabels = ingParts.some(function(p) { return p && p.label; });
    ingParts.forEach(function(p) {
      container.appendChild(makePartEl(p.label || '', p.rows || [], hasLabels));
    });
  } 
  else if (ingRows && ingRows.length > 0) {
    container.appendChild(makePartEl('', ingRows, false));
  } 
  else if (ingDetail) {
    // 古い形式のフォールバック
    var rows = ingDetail.split('\n').filter(Boolean).map(function(line) {
      var pts = line.split(/\s+/);
      return { name: pts[0] || '', amt: pts.slice(1).join(' ') || '', note: '' };
    });
    container.appendChild(makePartEl('', rows, false));
  } 
  else {
    container.appendChild(makePartEl('', null, false));
  }
}

function base64ToBlob(base64){
  const parts=base64.split(';base64,');const raw=window.atob(parts[1]);const uInt8Array=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;++i)uInt8Array[i]=raw.charCodeAt(i);
  return new Blob([uInt8Array],{type:'image/webp'});
}

async function uploadToStorage(photo){
  if(photo.data&&photo.data.startsWith('http'))return photo.data;
  const blob=base64ToBlob(photo.data);
  const fileName=`${Date.now()}_${Math.random().toString(36).slice(-5)}.webp`;
  const{error}=await window.supabase.storage.from('recipe-photos').upload(fileName,blob,{contentType:'image/webp',upsert:true});
  if(error)throw error;
  const{data:{publicUrl}}=window.supabase.storage.from('recipe-photos').getPublicUrl(fileName);
  return publicUrl;
}

async function deleteStoragePhotos(photoUrls){
  if(!photoUrls||photoUrls.length===0)return;
  const fileNames=photoUrls.map(url=>{const parts=url.split('/');return parts[parts.length-1];});
  const{error}=await window.supabase.storage.from('recipe-photos').remove(fileNames);
  if(error)console.warn('Storage delete error:',error);
}

async function saveRecipe(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('料理名を入力してください');return;}
  const saveBtn=document.querySelector('.modal-btns-right .btn-accent');
  const originalText=saveBtn.textContent;saveBtn.disabled=true;saveBtn.textContent='保存中...';
  try{
    let oldPhotoUrls=[];
    if(editId){const old=recipes.find(r=>String(r.id)===String(editId));if(old&&old.photos)oldPhotoUrls=old.photos.map(p=>p.data).filter(url=>url&&url.startsWith('http'));}
    const uploadedPhotos=await Promise.all(pendingPhotos.map(async(p)=>({title:p.title||'',data:await uploadToStorage(p),cover:!!p.cover})));
    const newUrls=uploadedPhotos.map(p=>p.data);
    const urlsToDelete=oldPhotoUrls.filter(url=>!newUrls.includes(url));
    if(urlsToDelete.length>0)await deleteStoragePhotos(urlsToDelete);
    const ings=document.getElementById('fIngs').value.split(',').map(s=>s.trim()).filter(Boolean);
    const ingParts=getIngData();
    const newId=editId||String(Date.now());
    const currentDate=new Date().toISOString().slice(0,10);
    const recipeData={
      id:String(newId),
name,desc:document.getElementById('fDesc').value,
cat:document.getElementById('fCat').value,
      genre:document.getElementById('fGenre').value,
ings,
url:document.getElementById('fUrl').value,
url_label: document.getElementById('fUrlLabel').value,
      yield_amount:document.getElementById('fYield').value.trim(),
      ing_parts:ingParts,steps:document.getElementById('fSteps').value,memo:document.getElementById('fMemo').value,
      pub:document.getElementById('fPub').checked,photos:uploadedPhotos,fav:false,heart:false,crown:false,date:currentDate
    };
    if(editId){const old=recipes.find(x=>String(x.id)===String(editId));if(old){recipeData.fav=!!old.fav;recipeData.heart=!!old.heart;recipeData.crown=!!old.crown;recipeData.date=old.date||currentDate;}}
    const{error}=await window.supabase.from('recipes').upsert(recipeData);if(error)throw error;
    if(editId){const idx=recipes.findIndex(x=>String(x.id)===String(editId));if(idx!==-1)recipes[idx]=recipeData;}else recipes.unshift(recipeData);
    alert('保存しました！');closeOverlay('overlayAdd');render();
  }catch(err){console.error('Save Error:',err);alert('保存に失敗しました: '+err.message);
  }finally{saveBtn.disabled=false;saveBtn.textContent=originalText;}
}

async function deleteRecipe(){

function renderIngSection(r){
  if(!r) return '';
  var currentId = r.id;
  var parts = r.ingParts || r.ing_parts || [];

  // パートあり
  if(Array.isArray(parts) && parts.length > 0){
    var hasLabels = parts.some(p => p && p.label);
    return parts.map(function(p){
      if(!p || !p.rows) return '';

    var lh = (hasLabels && p.label && p.label !== "説明")
      ? '<div style="font-size:12px;font-weight:500;color:#72243E;margin:10px 0 4px">'
        + '<span style="background:#f0e0eb;padding:3px 10px;border-radius:5px;display:inline-block">'
        + esc(p.label)
        + '</span></div>'
      : '';
    


      var rh = (p.rows || []).map(function(row){
        return '<tr>'
          + '<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5">' + ingNameHtml(row.name,currentId) + '</td>'
          + '<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5;color:#666">' + esc(row.amt) + '</td>'
          + '<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5;color:#888">' + esc(row.note) + '</td>'
          + '</tr>';
      }).join('');

      // ★★ ここで thead を削除して tbody のみ返す ★★
      return lh
        + '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px">'
        + '<tbody>' + rh + '</tbody></table>';
    }).join('');
  }

  // パートなし（ingRows）
  if(r.ingRows && r.ingRows.length){
    var rh2 = r.ingRows.map(function(row){
      return '<tr>'
        + '<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5">' + ingNameHtml(row.name,currentId) + '</td>'
        + '<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5;color:#666">' + esc(row.amt) + '</td>'
        + '<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5;color:#888">' + esc(row.note) + '</td>'
        + '</tr>';
    }).join('');

    // ★★ ここも thead を削除 ★★
    return '<table style="width:100%;border-collapse:collapse;font-size:13px">'
      + '<tbody>' + rh2 + '</tbody></table>';
  }

  if(r.ingDetail)
    return '<p style="font-size:13px;line-height:1.7;white-space:pre-wrap">' + esc(r.ingDetail) + '</p>';

  return '';
}

function openFromTextFile(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;var parsed=parseRecipeText(text);
    if(!parsed.name){alert('「料理名:」が見つかりませんでした。\nフォーマットを確認してください。');input.value='';return;}
    editId=null;pendingPhotos=[];
    document.getElementById('formTitle').textContent='レシピを追加（テキストから）';
    document.getElementById('fName').value=parsed.name;
    document.getElementById('fYield').value=parsed.yield_amount||'';
    document.getElementById('fDesc').value=parsed.desc;
    document.getElementById('fCat').value=parsed.cat;document.getElementById('fGenre').value=parsed.genre;
    document.getElementById('fIngs').value=parsed.ings;document.getElementById('fUrl').value=parsed.url;
    document.getElementById('fSteps').value=parsed.steps;document.getElementById('fMemo').value=parsed.memo;
    document.getElementById('fPub').checked=parsed.pub;document.getElementById('btnDelete').style.display='none';
    renderPhotoList();setIngData(parsed.ingParts,null,null);
    var ov=document.getElementById('overlayAdd');ov.scrollTop=0;openOverlay('overlayAdd');input.value='';
  };
  reader.readAsText(file,'UTF-8');
}

function parseRecipeText(text){
  var result={name:'',desc:'',cat:'',genre:'',ings:'',url:'',steps:'',memo:'',pub:false,yield_amount:'',ingParts:[]};
  var lines=text.split(/\r?\n/);var mode='none';var currentPartLabel='';var currentRows=[];var stepsLines=[];var memoLines=[];
  function flushPart(){if(currentRows.length>0){result.ingParts.push({label:currentPartLabel,rows:currentRows});currentRows=[];currentPartLabel='';}}
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(/^※/.test(line))continue;
    if(/^#\s+/.test(line)){
      var heading=line.replace(/^#\s+/,'').trim();
      if(mode==='ing')flushPart();
      if(/^パート名[:：]/.test(heading)){flushPart();currentPartLabel=heading.replace(/^パート名[:：]\s*/,'').trim();continue;}
      if(heading==='料理名'){mode='name';continue;}if(heading==='カテゴリ'){mode='cat';continue;}if(heading==='ジャンル'){mode='genre';continue;}
      if(heading==='説明'){mode='desc';continue;}if(heading==='食材タグ'){mode='ings';continue;}if(heading==='URL'){mode='url';continue;}
      if(heading==='公開'){mode='pub';continue;}if(heading==='手順'){mode='steps';continue;}if(heading==='覚書'){mode='memo';continue;}
      if(heading==='出来上がり量'){mode='yield';continue;}
      if(heading==='材料'){mode='ing';currentPartLabel='';continue;}mode='none';continue;
    }
    if(line===''){if(mode==='steps')stepsLines.push('');if(mode==='memo')memoLines.push('');continue;}
    if(mode==='name'){result.name=line;mode='none';continue;}if(mode==='cat'){result.cat=line;mode='none';continue;}
    if(mode==='genre'){result.genre=line;mode='none';continue;}if(mode==='desc'){result.desc=line;mode='none';continue;}
    if(mode==='ings'){result.ings=line;mode='none';continue;}if(mode==='url'){result.url=line;mode='none';continue;}
    if(mode==='pub'){result.pub=/^(はい|yes|true|1)$/i.test(line);mode='none';continue;}
    if(mode==='yield'){result.yield_amount=line;mode='none';continue;}
    if(mode==='ing'){var cols=line.split(/,|，/).map(function(s){return s.trim();});currentRows.push({name:cols[0]||'',amt:cols[1]||'',note:cols[2]||''});continue;}
    if(mode==='steps'){stepsLines.push(line);continue;}if(mode==='memo'){memoLines.push(line);continue;}
  }
  flushPart();result.steps=stepsLines.join('\n').trim();result.memo=memoLines.join('\n').trim();return result;
}

var pendingCommonTipPhoto=null;

function handleCommonTipPhoto(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=1200,w=img.width,h=img.height;var scale=(w>MAX||h>MAX)?MAX/Math.max(w,h):1;
      var canvas=document.createElement('canvas');canvas.width=Math.round(w*scale);canvas.height=Math.round(h*scale);
      var ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);
      pendingCommonTipPhoto=canvas.toDataURL('image/webp',0.85);
      document.getElementById('commonTipPhotoPreview').innerHTML='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><img src="'+pendingCommonTipPhoto+'" style="width:52px;height:40px;object-fit:cover;border-radius:5px;border:1px solid #ddd"><button type="button" onclick="clearCommonTipPhoto()" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:14px">✕</button></div>';
    };img.src=e.target.result;
  };reader.readAsDataURL(file);input.value='';
}

function clearCommonTipPhoto(){pendingCommonTipPhoto=null;document.getElementById('commonTipPhotoPreview').innerHTML='';}

function openCommonTipsManager(){
  pendingCommonTipPhoto=null;document.getElementById('commonTipPhotoPreview').innerHTML='';
  renderCommonTipList();openOverlay('overlayCommonTips');
}

async function renderCommonTipList(){
  const listDiv=document.getElementById('commonTipList');
  let {data:tips}=await window.supabase.from('notes_and_tips')
    .select('*')
    .is('recipe_id',null)
    .order('created_at',{ascending:true});

  // ★ 閲覧モードでは公開のみ表示
  if (!isEditor) {
    tips = tips.filter(t => t.pub);
  }

  // ★ 編集モードの公開/非公開フィルタ
  const p = document.getElementById('filterPub').value;
  if (isEditor) {
    if (p === '1') tips = tips.filter(t => t.pub);
    if (p === '0') tips = tips.filter(t => !t.pub);
  }

  if(!tips || tips.length === 0){
    listDiv.innerHTML='<p style="font-size:11px;color:#999;text-align:center">なし</p>';
    return;
  }

  listDiv.innerHTML = tips.map(t=>{
    const imgHtml = t.image_url
      ? `<img src="${t.image_url}" style="width:36px;height:36px;object-fit:cover;border-radius:5px;margin-right:6px;flex-shrink:0">`
      : '';

    return `
      <div style="font-size:12px;border-bottom:1px solid #eee;padding:8px 0;display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:center">
          ${imgHtml}
          <div>
            <strong>${esc(t.title)}</strong>
            <div style="font-size:11px;color:#666;margin-top:2px">
              ${esc(t.content.length>40 ? t.content.slice(0,40)+'…' : t.content)}
            </div>
          </div>
        </div>
        <button onclick="deleteCommonTip('${t.id}')" style="background:none;border:none;color:#638C3E;cursor:pointer;font-size:11px;flex-shrink:0;margin-left:8px">削除</button>
      </div>`;
  }).join('');
}


async function addCommonTip(){
  const title=document.getElementById('commonTipTitle').value.trim();const content=document.getElementById('commonTipContent').value.trim();
  if(!title||!content){alert('タイトルと内容を入力してください');return;}
  const addBtn=document.getElementById('commonTipAddBtn');addBtn.disabled=true;addBtn.textContent='追加中...';
  try{
    let imageUrl=null;if(pendingCommonTipPhoto)imageUrl=await uploadToStorage({data:pendingCommonTipPhoto});
    await window.supabase.from('notes_and_tips').insert({recipe_id:null,title,content,image_url:imageUrl,category:'tips'});
    document.getElementById('commonTipTitle').value='';document.getElementById('commonTipContent').value='';clearCommonTipPhoto();renderCommonTipList();render();
  }catch(err){alert('追加に失敗しました: '+err.message);
  }finally{addBtn.disabled=false;addBtn.textContent='共通チップスを追加';}
}

async function deleteCommonTip(id){
  if(!confirm('削除しますか？'))return;
  const{data:tip}=await window.supabase.from('notes_and_tips').select('image_url').eq('id',id).single();
  if(tip&&tip.image_url)await deleteStoragePhotos([tip.image_url]);
  await window.supabase.from('notes_and_tips').delete().eq('id',id);
  renderCommonTipList();render();
}
