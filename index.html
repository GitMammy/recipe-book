

<!DOCTYPE html>
<html lang="ja">
  <!--　260627-0530　-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍪 おかしなぺぇじ 🥐</title>
<link rel="icon" href="favicon.ico">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#fafafa;color:#1a1a1a}

.app {
  padding: 1.25rem 1.5rem !important;
  max-width: 960px;
  margin: 0 auto;
  display: block !important; /* blockに戻して左右の余白を有効にします */
  width: 100%;
  box-sizing: border-box;
}

/* ツールバーがはみ出さないように調整 */
.topbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 1.5rem;
  width: 100%;
}

input[type=text]{height:36px;padding:0 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;outline:none}
input[type=text]:focus{border-color:#D4537E}
select{height:36px;padding:0 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer}
.btn{height:36px;padding:0 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn-accent{background:#D4537E;color:#fff;border-color:#D4537E}
.btn-accent:hover{background:#993556}
.btn-sm{height:28px;padding:0 10px;font-size:12px}

.toolbar-right {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;          /* ボタンたちが潰れないようにする */
}

.fav-filter {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;                /* アイコン同士の隙間を 6px に固定 */
  font-size: 14px;
  color: #888;
  cursor: pointer;
  height: 36px;
  padding: 0 10px;         /* 左右の余白を少し詰める */
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;
  width: fit-content;      /* 【重要】幅を中身に合わせる設定 */
  min-width: 0 !important; /* 強制的に最小幅の設定を消す */
}
.fav-filter:hover{background:#f0f0f0}
.count-bar{font-size:13px;color:#888;margin-bottom:10px}


.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  justify-content: center; /* 【追加】カード全体を中央に寄せる */
  width: 100%;             /* 親要素（.app）の幅に合わせる */
}

.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#aaa}
.card-img{width:100%;height:130px;object-fit:cover;display:block;background:#f5f5f5}
.card-img-placeholder{width:100%;height:130px;display:flex;align-items:center;justify-content:center;font-size:32px;background:#FBEAF0}
.card-body{padding:10px 12px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px}
.card-title{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.4;flex:1}
.hearts{display:flex;gap:2px;flex-shrink:0}
.heart-btn,.star-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0;line-height:1;color:#ccc}
.heart-btn.on{color:#D4537E}
.star-btn.on{color:#BA7517}
.card-desc{font-size:12px;color:#666;margin-bottom:8px;line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.tag{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:400;border:none}
.t-cat{background:#FBEAF0;color:#72243E}
.t-ing{background:#FAEEDA;color:#633806}
.t-pub{background:#EAF3DE;color:#27500A}
.t-priv{background:#F1EFE8;color:#5F5E5A}
.card-footer{font-size:11px;color:#aaa}
.empty{text-align:center;padding:3rem;color:#888;font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:1.5rem;width:100%;max-width:540px;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:#888;line-height:1}
.modal-close:hover{color:#1a1a1a}
.modal h2{font-size:17px;font-weight:500;margin-bottom:1.25rem;padding-right:24px}
.field{margin-bottom:0.9rem}
.field label{display:block;font-size:12px;color:#666;margin-bottom:3px;font-weight:500}
.field input[type=text],.field textarea{width:100%}
.field textarea{resize:vertical;padding:8px 10px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;line-height:1.6;outline:none}
.field textarea:focus{border-color:#D4537E}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}
.modal-btns{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;gap:8px}
.modal-btns-right{display:flex;gap:8px}
.detail-section{margin-bottom:1rem}
.detail-section h3{font-size:12px;color:#72243E;margin-bottom:6px;font-weight:500;background:#FBEAF0;padding:4px 8px;border-radius:5px}
.detail-section p{font-size:13px;color:#1a1a1a;line-height:1.7;white-space:pre-wrap}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.detail-top h2{font-size:18px;font-weight:500;flex:1}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.pub-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#1a1a1a}
.ing-table{width:100%;border-collapse:collapse;font-size:13px}
.ing-table th{font-size:11px;color:#555;font-weight:700;padding:4px 6px;border-bottom:2px solid #ddd;text-align:left}
.ing-table td{padding:3px 4px;vertical-align:middle}
.ing-table td input{height:30px;padding:0 6px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;width:100%;outline:none}
.ing-table td input:focus{border-color:#D4537E}
.col-name{width:35%}.col-amt{width:23%}.col-note{width:auto}.col-del{width:24px}.col-move{width:28px}
.btn-del-row{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;line-height:1;padding:0 2px}
.btn-del-row:hover{color:#E24B4A}
.btn-move-row{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;line-height:1.1;padding:0;display:block;width:14px;text-align:center}
.btn-move-row:hover{color:#888}
.photo-cover-label{display:flex;align-items:center;gap:3px;font-size:11px;color:#888;white-space:nowrap;cursor:pointer}
.photo-cover-label input{width:auto;height:auto;cursor:pointer}
.btn-add-row{height:26px;padding:0 10px;font-size:12px;border:1px dashed #D4537E;border-radius:6px;background:#fff;color:#D4537E;cursor:pointer;margin-top:5px}
.btn-add-row:hover{background:#FBEAF0}
.btn-add-part{height:26px;padding:0 10px;font-size:12px;border:1px dashed #aaa;border-radius:6px;background:#fff;color:#888;cursor:pointer;margin-top:5px;margin-left:6px}
.btn-add-part:hover{background:#f5f5f5}
.ing-part{margin-bottom:10px;border:1px solid #f0e0eb;border-radius:8px;padding:8px 10px;transition:opacity .15s}
.ing-part.drag-over{border-color:#D4537E;background:#fff8fb}
.ing-part-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.drag-handle{cursor:grab;color:#ccc;font-size:15px;flex-shrink:0;line-height:1;user-select:none;padding:0 2px}
.drag-handle:hover{color:#aaa}
.drag-handle:active{cursor:grabbing}
.ing-part-name{height:26px;padding:0 6px;border:1px solid #e8d0dc;border-radius:6px;background:#fff8fb;font-size:13px;font-weight:500;color:#993556;outline:none;flex:1;max-width:200px}
.ing-part-name:focus{border-color:#D4537E}
.ing-part-label-wrap{display:inline-flex;align-items:center;gap:4px;background:#f0e0eb;padding:2px 8px 2px 6px;border-radius:6px}
.ing-part-name::placeholder{color:#ccc;font-weight:400}
.btn-del-part{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;line-height:1;padding:2px 4px;margin-left:auto;border-radius:4px}
.btn-del-part:hover{color:#E24B4A;background:#fff0f0}
.photo-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.photo-item{display:flex;align-items:center;gap:8px;border:1px solid #eee;border-radius:8px;padding:6px 8px;background:#fff}
.photo-thumb{width:52px;height:40px;object-fit:cover;border-radius:5px;flex-shrink:0}
.photo-title-input{flex:1;height:28px;padding:0 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.photo-title-input:focus{border-color:#D4537E}
.btn-del-photo{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0 2px;line-height:1}
.btn-del-photo:hover{color:#E24B4A}
.btn-add-photo{height:28px;padding:0 12px;font-size:12px;border:1px dashed #aaa;border-radius:6px;background:#fff;color:#888;cursor:pointer}
.btn-add-photo:hover{background:#f5f5f5}
.photo-gallery{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.photo-gallery-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.photo-gallery-item img{width:90px;height:70px;border-radius:6px;display:block;object-fit:cover;cursor:pointer;border:1px solid #eee;transition:opacity .15s}
.photo-gallery-item img:hover{opacity:0.8}
.photo-gallery-caption{font-size:11px;color:#888;text-align:center;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:1rem}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox-caption{color:#fff;font-size:13px;text-align:center}
.lightbox-close{position:absolute;top:14px;right:18px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1}
/* --- ここから追加 --- */
.crown-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px; /* ♡や★より少し大きくするとバランスが良いです */
  padding: 0;
  line-height: 1;
  color: #ccc;
  transition: color 0.2s;
}
.crown-btn.on {
  color: #FFD700; /* 豪華なゴールド！ */
  text-shadow: 0 0 5px rgba(255, 215, 0, 0.3); /* ほんのり光らせる */
}
/* --- ここまで追加 --- */


@media(max-width:600px){
.field-row{flex-direction:column}
.app{padding:1rem 1.25rem}
.topbar{gap:6px}
.topbar input[type=text]{min-width:120px}
.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.card-img,.card-img-placeholder{height:110px}
.modal{padding:1.25rem 1rem;border-radius:10px}
.overlay{padding:0.75rem}
.photo-gallery-item img{width:72px;height:56px}
.photo-gallery-caption{max-width:72px}
.btn,.btn-accent{font-size:13px;padding:0 10px}
.toolbar-right{gap:4px}
}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <input type="text" id="search" placeholder="料理名・食材で検索..." style="flex:1;min-width:150px">
  <select id="filterCat"><option value="">カテゴリ：すべて</option></select>
  <select id="filterPub"><option value="">公開：すべて</option><option value="1">公開</option><option value="0">非公開</option></select>
  
  <div class="toolbar-right">
    <button class="fav-filter" onclick="toggleFavFilter()">
      <span id="favFilterIcon" style="font-size:15px;color:#ccc">♡</span>
      <span id="favFilterStar" style="font-size:14px;color:#ccc">★</span>
      <span id="favFilterCrown" style="font-size:14px;color:#ccc">♚</span>
    </button> 

    <button class="btn" onclick="exportData()">書き出し</button>
    <button class="btn" onclick="document.getElementById('txtFileInput').click()" title="テキストファイルからレシピを追加">📄 TXTから追加</button>
    <input type="file" id="txtFileInput" accept=".txt,text/plain" style="display:none" onchange="openFromTextFile(this)">
    <button class="btn btn-accent" onclick="openAdd()">+ 追加</button>
  </div>
</div>
<div class="count-bar" id="countLabel"></div>
<div class="grid" id="grid"></div>

</div>

<div class="overlay" id="overlayAdd">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('overlayAdd')">✕</button>
    <h2 id="formTitle">レシピを追加</h2>
    <div class="field"><label>料理名</label><input type="text" id="fName" placeholder="例：鶏の唐揚げ"></div>
    <div class="field"><label>説明</label><input type="text" id="fDesc" placeholder="一言メモ"></div>
    <div class="field-row">
      <div class="field"><label>カテゴリ</label><input type="text" id="fCat" list="catList" placeholder="例：主菜"><datalist id="catList"></datalist></div>
      <div class="field"><label>ジャンル</label><input type="text" id="fGenre" list="genreList" placeholder="例：和食"><datalist id="genreList"></datalist></div>
    </div>
    <div class="field"><label>食材タグ（カンマ区切り）</label><input type="text" id="fIngs" placeholder="例：鶏もも肉, にんにく, しょうが"></div>
    <div class="field"><label>元レシピURL（任意）</label><input type="text" id="fUrl" placeholder="https://..."></div>
    <div class="field">
      <label>写真（複数可・タイトル付き）</label>
      <div class="photo-list" id="photoList"></div>
      <button class="btn-add-photo" onclick="document.getElementById('photoFileInput').click()">+ 写真を追加</button>
      <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoAdd(this)">
    </div>
    <div class="field">
      <label>材料</label>
      <div id="ingParts"></div>
      <div style="display:flex;margin-top:6px">
        <button class="btn-add-row" onclick="addRowToLastPart()">+ 行を追加</button>
        <button class="btn-add-part" onclick="addNewPart()">+ パートを追加</button>
      </div>
    </div>
    <div class="field"><label>手順</label><textarea id="fSteps" style="height:100px" placeholder="① 〜&#10;② 〜"></textarea></div>
    <div class="field"><label>アレンジ・覚書</label><textarea id="fMemo" style="height:60px" placeholder="こうするともっと美味しい、など"></textarea></div>
    <div class="field"><label class="pub-toggle"><input type="checkbox" id="fPub" style="width:auto"> 公開する</label></div>
    <div class="modal-btns">
      <button class="btn btn-sm btn-danger" id="btnDelete" style="display:none" onclick="deleteRecipe()">削除</button>
      <div class="modal-btns-right">
        <button class="btn btn-sm" onclick="closeOverlay('overlayAdd')">キャンセル</button>
        <button class="btn btn-sm btn-accent" onclick="saveRecipe()">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlayDetail">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('overlayDetail')">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.SUPABASE_URL = 'https://aoxgiqjcfbzrhdonknvc.supabase.co';
window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFveGdpcWpjZmJ6cmhkb25rbnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTI0NTQsImV4cCI6MjA4OTgyODQ1NH0.JWz-F39M0eYMfkncCOZUyNOJUWgh0c93qp9ubj9d0UI';
window.supabase = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

var recipes = [];
var editId = null;
var favFilter = null;
var dragSrc = null;
var pendingPhotos = [];

async function loadRecipes() {
  const { data, error } = await window.supabase.from('recipes').select('*').order('date', { ascending: false });
  if (!error && data) {
    recipes = data.map(function(r) {
      r.ingParts = r.ing_parts || [];
      r.ingRows  = r.ing_rows  || [];
      r.desc     = r.desc      || '';
      return r;
    });
    render();
  }
}

function genId(){ return 'r' + Date.now(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.addEventListener('load', loadRecipes);

function getFiltered(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var c=document.getElementById('filterCat').value;
  var p=document.getElementById('filterPub').value;
  return recipes.filter(function(r){
    // --- ここを修正 ---
    if(favFilter==='heart' && !r.heart) return false;
    if(favFilter==='star' && !r.fav) return false;
    if(favFilter==='crown' && !r.crown) return false; // 王冠フィルタを追加
    // ----------------
    if(c&&r.cat!==c)return false;
    if(p==='1'&&!r.pub)return false;
    if(p==='0'&&r.pub)return false;
    if(q){var hay=(r.name+r.desc+(r.ings||[]).join(' ')).toLowerCase();if(hay.indexOf(q)<0)return false;}
    return true;
  });
}



function toggleFavFilter(){
  // サイクル：なし -> heart -> star -> crown -> なし
  if(!favFilter) favFilter = 'heart';
  else if(favFilter === 'heart') favFilter = 'star';
  else if(favFilter === 'star') favFilter = 'crown'; // 星の次に王冠を追加
  else favFilter = null;

  // アイコンの色更新（王冠用のID：favFilterCrown を想定）
  document.getElementById('favFilterIcon').style.color = (favFilter==='heart'?'#D4537E':'#ccc');
  document.getElementById('favFilterStar').style.color = (favFilter==='star'?'#BA7517':'#ccc');
  
  // 王冠アイコンの色も変える（後ほどHTMLにIDを追加します）
  var crownIcon = document.getElementById('favFilterCrown');
  if(crownIcon) crownIcon.style.color = (favFilter==='crown'?'#FFD700':'#ccc');

  render();
}

function getThumb(r){
  if(r.photos&&r.photos.length){
    var cover=r.photos.find(function(p){return p.cover;});
    return cover?cover.data:'';
  }
  if(r.img)return r.img;
  return '';
}

function render(){
  updateSelects();
  var list=getFiltered();
  document.getElementById('countLabel').textContent=list.length+'件';
  var g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="empty">レシピがありません</div>';return;}
  g.innerHTML=list.map(function(r){
    var thumb=getThumb(r);
    var imgHtml=thumb
      ?'<img class="card-img" src="'+thumb+'" alt="">'
      :'<div class="card-img-placeholder">'+getCatEmoji(r.cat)+'</div>';
    var photoCount=(r.photos&&r.photos.length>1)?'<span style="font-size:10px;color:#aaa;margin-left:4px">📷'+r.photos.length+'</span>':'';
    var descHtml=r.desc?'<div class="card-desc">'+esc(r.desc)+'</div>':'';
    var catTag=r.cat?'<span class="tag t-cat">'+esc(r.cat)+'</span>':'';
    var ingTags=(r.ings||[]).slice(0,2).map(function(i){return '<span class="tag t-ing">'+esc(i.trim())+'</span>';}).join('');
    var moreTag=(r.ings||[]).length>2?'<span class="tag t-ing">+'+(r.ings.length-2)+'</span>':'';
    var pubTag='<span class="tag '+(r.pub?'t-pub':'t-priv')+'" style="font-size:10px">'+(r.pub?'公開':'非公開')+'</span>';
    return '<div class="card" onclick="openDetail(\''+r.id+'\')">'
      +imgHtml
      +'<div class="card-body">'
      +'<div class="card-top"><div class="card-title">'+esc(r.name)+photoCount+'</div>'
      +'<div class="hearts">'
      +'<button class="heart-btn'+(r.heart?' on':'')+'" onclick="toggleHeart(event,\''+r.id+'\')">♡</button>'
      +'<button class="star-btn'+(r.fav?' on':'')+'" onclick="toggleStar(event,\''+r.id+'\')">★</button>'
      +'<button class="crown-btn'+(r.crown?' on':'')+'" onclick="toggleCrown(event,\''+r.id+'\')">♚</button>' // これを追加！
      +'</div></div>'
      +descHtml
      +'<div class="tags">'+catTag+ingTags+moreTag+'</div>'
      +'<div class="card-footer">'+pubTag+'<span style="margin-left:4px">'+(r.date||'')+'</span></div>'
      +'</div></div>';
  }).join('');
}

function getCatEmoji(cat){
  if(!cat)return '🍽';
  if(cat.indexOf('主菜')>=0)return '🍖';
  if(cat.indexOf('副菜')>=0)return '🥗';
  if(cat.indexOf('汁')>=0||cat.indexOf('スープ')>=0)return '🍲';
  if(cat.indexOf('デザート')>=0||cat.indexOf('お菓子')>=0||cat.indexOf('焼き菓子')>=0)return '🍰';
  if(cat.indexOf('主食')>=0||cat.indexOf('麺')>=0||cat.indexOf('パスタ')>=0)return '🍜';
  if(cat.indexOf('飲み')>=0)return '🥤';
  return '🍽';

function handlePhotoAdd(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=1200;
      var w=img.width, h=img.height;
      var dataUrl;
      
      // 画像が大きくても小さくても、必ずCanvasを通してWebPに変換する
      var scale = (w > MAX || h > MAX) ? MAX / Math.max(w, h) : 1;
      var cw = Math.round(w * scale);
      var ch = Math.round(h * scale);
      
      var canvas = document.createElement('canvas');
      canvas.width = cw;
      canvas.height = ch;
      var ctx = canvas.getContext('2d');
      
      // 背景を白にする（透過画像が黒くならないための工夫）
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, cw, ch);
      
      ctx.drawImage(img, 0, 0, cw, ch);
      
      // ここを image/webp に変更！
      dataUrl = canvas.toDataURL('image/webp', 0.85); 
      
      pendingPhotos.push({title:'', data:dataUrl});
      renderPhotoList();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}

function renderPhotoList(){

  pendingPhotos.forEach(function(photo,i){

    titleInput.className='photo-title-input';
    titleInput.placeholder='タイトル（例：完成品、断面）';
    titleInput.value=photo.title||'';
    (function(idx){
      titleInput.oninput=function(){pendingPhotos[idx].title=this.value;};
    })(i);
    // 一覧用チェックボックス（排他：1枚だけ）
    var coverLabel=document.createElement('label');
    coverLabel.className='photo-cover-label';
    var coverCb=document.createElement('input');
    coverCb.type='checkbox';
    coverCb.checked=!!photo.cover;
    (function(idx){
      coverCb.onchange=function(){
        pendingPhotos.forEach(function(p){p.cover=false;});
        pendingPhotos[idx].cover=this.checked;
        renderPhotoList();
      };
    })(i);
    coverLabel.appendChild(coverCb);

    list.appendChild(item);
  });
}

function setupPartDrag(el){
  el.addEventListener('dragstart',function(e){
    dragSrc=el;
    setTimeout(function(){el.style.opacity='0.4';},0);
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend',function(){
    el.style.opacity='';
    document.querySelectorAll('#ingParts .ing-part').forEach(function(p){p.classList.remove('drag-over');});
  });
  el.addEventListener('dragover',function(e){
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    if(el!==dragSrc)el.classList.add('drag-over');
  });
  el.addEventListener('dragleave',function(){el.classList.remove('drag-over');});
  el.addEventListener('drop',function(e){
    e.preventDefault();
    el.classList.remove('drag-over');
    if(!dragSrc||dragSrc===el)return;
    var parts=Array.prototype.slice.call(document.getElementById('ingParts').querySelectorAll('.ing-part'));
    var si=parts.indexOf(dragSrc),ti=parts.indexOf(el);
    if(si<ti)el.parentNode.insertBefore(dragSrc,el.nextSibling);
    else el.parentNode.insertBefore(dragSrc,el);
  });
}

function removePart(btn){
  var part=btn.closest('.ing-part');

  if(container.querySelectorAll('.ing-part').length<=1){alert('最低1つのパートが必要です');return;}
  if(!confirm('このパートを削除しますか？'))return;
  part.remove();
}

function getIngData(){

  var container=document.getElementById('ingParts');

    var hasLabels=ingParts.some(function(p){return p.label;});
    ingParts.forEach(function(p){container.appendChild(makePartEl(p.label,p.rows,hasLabels));});

  }

// --- ヘルパー関数 WebP対応版: Base64をBlobに変換 ---
function base64ToBlob(base64) {
  const parts = base64.split(';base64,');
  // 元が何であれ、アプリ側でWebPとして扱う指示を出す
  const contentType = 'image/webp'; 
  const raw = window.atob(parts[1]);
  const rawLength = raw.length;
  const uInt8Array = new Uint8Array(rawLength);
  for (let i = 0; i < rawLength; ++i) {
    uInt8Array[i] = raw.charCodeAt(i);
  }
  return new Blob([uInt8Array], { type: contentType });
}

// --- ヘルパー関数(お掃除機能付き): Storageへ1枚アップロードしてURLを返す ---
async function uploadToStorage(photo) {
  if (photo.data && photo.data.startsWith('http')) {
    return photo.data;
  }

  const blob = base64ToBlob(photo.data);
  // 拡張子を .webp に固定
  const fileName = `${Date.now()}_${Math.random().toString(36).slice(-5)}.webp`;
  
  const { data, error } = await window.supabase.storage
    .from('recipe-photos')
    .upload(fileName, blob, {
      contentType: 'image/webp', // 明示的にWebPとしてアップロード
      upsert: true
    });

  if (error) throw error;

  const { data: { publicUrl } } = window.supabase.storage
    .from('recipe-photos')
    .getPublicUrl(fileName);

  return publicUrl;
}

// --- 【新規】Storageから画像を削除する関数 ---
async function deleteStoragePhotos(photoUrls) {
  if (!photoUrls || photoUrls.length === 0) return;

  // URLからファイル名だけを抽出
  const fileNames = photoUrls.map(url => {
    const parts = url.split('/');
    return parts[parts.length - 1];
  });

  const { error } = await window.supabase.storage
    .from('recipe-photos')
    .remove(fileNames);

  if (error) console.warn('Storage delete error:', error);
}

// 1. Base64データを「ファイル（Blob）」に変換する関数
function base64ToBlob(base64) {
  const parts = base64.split(';base64,');
  const contentType = parts[0].split(':')[1];
  const raw = window.atob(parts[1]);
  const rawLength = raw.length;
  const uInt8Array = new Uint8Array(rawLength);
  for (let i = 0; i < rawLength; ++i) {
    uInt8Array[i] = raw.charCodeAt(i);
  }
  return new Blob([uInt8Array], { type: contentType });
}

// 2. Storageにアップロードして「URL」を返してもらう関数
// (内部で上の base64ToBlob を使います)
async function uploadToStorage(photo) {
  // すでにURL（http...）なら、もうStorageにあるのでそのまま返す
  if (photo.data && photo.data.startsWith('http')) {
    return photo.data;
  }

  const blob = base64ToBlob(photo.data);
  const ext = blob.type.split('/')[1] || 'jpg';
  // ファイル名が重ならないように「時間＋ランダム文字列」にする
  const fileName = `${Date.now()}_${Math.random().toString(36).slice(-5)}.${ext}`;
  
  const { data, error } = await window.supabase.storage
    .from('recipe-photos') // ← ここ、Supabaseで作ったバケット名と合わせてくださいね！
    .upload(fileName, blob);

  if (error) throw error;

  // 公開用URLを取得
  const { data: { publicUrl } } = window.supabase.storage
    .from('recipe-photos')
    .getPublicUrl(fileName);

  return publicUrl;
}




// --- メインの保存関数 --- 260326-1556 edit
async function saveRecipe() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('料理名を入力してください'); return; }

  // 保存ボタンを一時的に無効化（二重送信防止）
  const saveBtn = document.querySelector('.modal-btns-right .btn-accent');
  const originalText = saveBtn.textContent;
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';

  try {
    // --- 1. 古い画像のURLを特定（お掃除準備） ---
    let oldPhotoUrls = [];
    if (editId) {
      const oldRecipe = recipes.find(r => String(r.id) === String(editId));
      if (oldRecipe && oldRecipe.photos) {
        // 現在Storageにある（httpから始まる）URLだけを抽出
        oldPhotoUrls = oldRecipe.photos.map(p => p.data).filter(url => url && url.startsWith('http'));
      }
    }

    // --- 2. 画像をすべてStorageにアップロード（WebP変換含む） ---
    const uploadedPhotos = await Promise.all(pendingPhotos.map(async (p) => {
      // すでにURLならそのまま、Base64ならWebPとしてアップロードしてURLを取得
      const url = await uploadToStorage(p);
      return {
        title: p.title || '',
        data: url,
        cover: !!p.cover
      };
    }));

    // --- 3. 不要になった古い画像をStorageから削除 ---
    const newUrls = uploadedPhotos.map(p => p.data);
    const urlsToDelete = oldPhotoUrls.filter(url => !newUrls.includes(url));
    if (urlsToDelete.length > 0) {
      await deleteStoragePhotos(urlsToDelete);
    }

    // --- 4. レシピデータの作成 ---
    const ings = document.getElementById('fIngs').value.split(',').map(s => s.trim()).filter(Boolean);
    const ingParts = getIngData();
    const newId = editId || String(Date.now());
    const currentDate = new Date().toISOString().slice(0, 10);

    const recipeData = {
      id: String(newId),
      name: name,
      desc: document.getElementById('fDesc').value,
      cat: document.getElementById('fCat').value,
      genre: document.getElementById('fGenre').value,
      ings: ings,
      url: document.getElementById('fUrl').value,
      ing_parts: ingParts,
      steps: document.getElementById('fSteps').value,
      memo: document.getElementById('fMemo').value,
      pub: document.getElementById('fPub').checked,
      photos: uploadedPhotos, // WebPのURLリスト
      fav: false,
      heart: false,
      date: currentDate
    };

    // 編集時は既存のステータスを維持
    if (editId) {
      const old = recipes.find(x => String(x.id) === String(editId));
      if (old) {
        recipeData.fav = !!old.fav;
        recipeData.heart = !!old.heart;
        recipeData.date = old.date || currentDate;
      }
    }

    // --- 5. Supabase DBへ保存 (upsert) ---
    const { error } = await window.supabase
      .from('recipes')
      .upsert(recipeData);

    if (error) throw error;

    // --- 6. ローカルの配列を更新して再描画 ---
    if (editId) {
      const idx = recipes.findIndex(x => String(x.id) === String(editId));
      if (idx !== -1) recipes[idx] = recipeData;
    } else {
      recipes.unshift(recipeData);
    }

    alert('保存しました！');
    closeOverlay('overlayAdd');
    render();

  } catch (err) {
    console.error('Save Error:', err);
    alert('保存に失敗しました: ' + err.message);
  } finally {
    // ボタンを元に戻す
    saveBtn.disabled = false;
    saveBtn.textContent = originalText;
  }
}

// ★修正：Supabaseから直接削除するように変更

async function deleteRecipe(){
  if(!confirm('このレシピを削除しますか？')) return;

  try {
    const targetId = String(editId);
    const targetRecipe = recipes.find(r => String(r.id) === targetId);

    // 1. Storageの画像を削除
    if (targetRecipe && targetRecipe.photos) {
      const urls = targetRecipe.photos.map(p => p.data).filter(url => url.startsWith('http'));
      await deleteStoragePhotos(urls);
    }

    // 2. DBから削除
    const { error } = await window.supabase.from('recipes').delete().eq('id', targetId);
    if(error) throw error;

    // 3. ローカル配列から削除
    recipes = recipes.filter(r => String(r.id) !== targetId);

    alert('削除しました');
    closeOverlay('overlayAdd');
    render();
  } catch(err){
    console.error('Delete Error:', err);
    alert('削除に失敗しました: ' + err.message);
  }
}

          +'<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5;color:#888">'+esc(row.note)+'</td></tr>';
      }).join('');
      return lh+'<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px">'
        +'<thead><tr>'
        +'<th style="text-align:left;padding:3px 6px;font-size:11px;color:#555;font-weight:700;border-bottom:2px solid #ddd">材料名</th>'
        +'<th style="text-align:left;padding:3px 6px;font-size:11px;color:#555;font-weight:700;border-bottom:2px solid #ddd">分量</th>'
        +'<th style="text-align:left;padding:3px 6px;font-size:11px;color:#555;font-weight:700;border-bottom:2px solid #ddd">備考</th>'
        +'</tr></thead><tbody>'+rh+'</tbody></table>';
    }).join('');
  }
  if(r.ingRows&&r.ingRows.length){
    var rh2=r.ingRows.map(function(row){
      return '<tr><td style="padding:4px 6px;border-bottom:1px solid #f5f5f5">'+esc(row.name)+'</td>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5;color:#666">'+esc(row.amt)+'</td>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f5f5f5;color:#888">'+esc(row.note)+'</td></tr>';
    }).join('');
    return '<table style="width:100%;border-collapse:collapse;font-size:13px">'
      +'<thead><tr>'
      +'<th style="text-align:left;padding:3px 6px;font-size:11px;color:#888;font-weight:500;border-bottom:1px solid #eee">材料名</th>'
      +'<th style="text-align:left;padding:3px 6px;font-size:11px;color:#888;font-weight:500;border-bottom:1px solid #eee">分量</th>'
      +'<th style="text-align:left;padding:3px 6px;font-size:11px;color:#888;font-weight:500;border-bottom:1px solid #eee">備考</th>'
      +'</tr></thead><tbody>'+rh2+'</tbody></table>';
  }
  if(r.ingDetail)return '<p style="font-size:13px;line-height:1.7;white-space:pre-wrap">'+esc(r.ingDetail)+'</p>';
  return '';
}

function openDetail(id){
  var r=recipes.find(function(x){return String(x.id)===String(id);});
  if(!r){console.error('Recipe not found for ID:',id);return;}
  var ingHtml=renderIngSection(r);
  var photos=(r.photos&&r.photos.length)?r.photos:(r.img?[{title:'',data:r.img}]:[]);
  currentPhotos=photos;
  var html='';
  html+='<div class="detail-top"><h2>'+esc(r.name)+'</h2>'
    +'<div style="display:flex;gap:4px;flex-shrink:0">'
    +'<button class="heart-btn'+(r.heart?' on':'')+'" style="font-size:18px" onclick="toggleHeart(event,\''+r.id+'\');openDetail(\''+r.id+'\')">♡</button>'
    +'<button class="star-btn'+(r.fav?' on':'')+'" style="font-size:17px" onclick="toggleStar(event,\''+r.id+'\');openDetail(\''+r.id+'\')">★</button>'
    + '<button class="crown-btn'+(r.crown?' on':'')+'" style="font-size:18px" onclick="toggleCrown(event,\''+r.id+'\');openDetail(\''+r.id+'\')">♚</button>'
    +'</div></div>';
  html+='<div class="tags" style="margin-bottom:1rem">'
    +(r.cat?'<span class="tag t-cat">'+esc(r.cat)+'</span>':'')
    +(r.genre?'<span class="tag t-ing">'+esc(r.genre)+'</span>':'')
    +'<span class="tag '+(r.pub?'t-pub':'t-priv')+'">'+(r.pub?'公開':'非公開')+'</span>'
    +'</div>';
  if(r.desc)html+='<div class="detail-section"><h3>説明</h3><p>'+esc(r.desc)+'</p></div>';
  if(r.ings&&r.ings.length){
    html+='<div class="detail-section"><h3>食材タグ</h3><div class="tags">'+r.ings.map(function(i){return '<span class="tag t-ing">'+esc(i)+'</span>';}).join('')+'</div></div>';
  }
  if(ingHtml)html+='<div class="detail-section"><h3>材料</h3>'+ingHtml+'</div>';
  if(r.steps)html+='<div class="detail-section"><h3>手順</h3><p>'+esc(r.steps)+'</p></div>';
  if(photos.length){
    html+='<div class="detail-section"><h3>写真</h3><div class="photo-gallery">';
    photos.forEach(function(p,i){
      html+='<div class="photo-gallery-item"><img src="'+p.data+'" alt="'+(p.title?esc(p.title):'')+'" onclick="openLightbox('+i+')" title="クリックで拡大">';
      if(p.title)html+='<div class="photo-gallery-caption">'+esc(p.title)+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  }
  if(r.memo)html+='<div class="detail-section"><h3>アレンジ・覚書</h3><p>'+esc(r.memo)+'</p></div>';
  if(r.url)html+='<div class="detail-section"><h3>元レシピ</h3><a href="'+esc(r.url)+'" style="font-size:13px;color:#185FA5;word-break:break-all">'+esc(r.url)+'</a></div>';
  html+='<div style="font-size:11px;color:#aaa;margin-bottom:1rem">'+(r.date||'')+'</div>';
  html+='<div class="modal-btns"><div></div><div class="modal-btns-right">'
    +'<button class="btn btn-sm" onclick="closeOverlay(\'overlayDetail\')">閉じる</button>'
    +'<button class="btn btn-sm btn-accent" onclick="openEdit(\''+r.id+'\')">編集</button>'
    +'</div></div>';
  document.getElementById('detailContent').innerHTML=html;
  openOverlay('overlayDetail');
}

function closeOverlay(id){document.getElementById(id).classList.remove('open');}

document.getElementById('overlayDetail').addEventListener('click',function(e){if(e.target===e.currentTarget)closeOverlay('overlayDetail');});

function exportData(){
  var exp=recipes.map(function(r){var o=Object.assign({},r);delete o.img;o.photos=[];return o;});
  var a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(exp,null,2));

// テキストファイルからレシピを読み込む

function openFromTextFile(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var text = e.target.result;
    var parsed = parseRecipeText(text);
    if(!parsed.name){
      alert('「料理名:」が見つかりませんでした。\nフォーマットを確認してください。');
      input.value = '';
      return;
    }
    // フォームをクリアして開く
    editId = null;
    pendingPhotos = [];
    document.getElementById('formTitle').textContent = 'レシピを追加（テキストから）';
    document.getElementById('fName').value    = parsed.name;
    document.getElementById('fDesc').value    = parsed.desc;
    document.getElementById('fCat').value     = parsed.cat;
    document.getElementById('fGenre').value   = parsed.genre;
    document.getElementById('fIngs').value    = parsed.ings;
    document.getElementById('fUrl').value     = parsed.url;
    document.getElementById('fSteps').value   = parsed.steps;
    document.getElementById('fMemo').value    = parsed.memo;
    document.getElementById('fPub').checked   = parsed.pub;
    document.getElementById('btnDelete').style.display = 'none';
    renderPhotoList();
    setIngData(parsed.ingParts, null, null);
    openOverlay('overlayAdd');
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function parseRecipeText(text){
  var result = {
    name:'', desc:'', cat:'', genre:'', ings:'',
    url:'', steps:'', memo:'', pub:false, ingParts:[]
  };

  var lines = text.split(/\r?\n/);

  // モード: 'none' | 'name' | 'cat' | 'genre' | 'desc' | 'ings' | 'url' | 'pub' | 'ing' | 'steps' | 'memo'
  var mode = 'none';
  var currentPartLabel = '';
  var currentRows = [];
  var stepsLines = [];
  var memoLines = [];
  var contentLines = []; // 単一行項目の一時バッファ

  function flushPart(){
    if(currentRows.length > 0){
      result.ingParts.push({ label: currentPartLabel, rows: currentRows });
      currentRows = [];
      currentPartLabel = '';
    }
  }

  function flushContent(){
    var val = contentLines.join('\n').trim();
    contentLines = [];
    return val;
  }

  for(var i = 0; i < lines.length; i++){
    var line = lines[i].trim();

    // ※ 始まりの行はコメント・但し書きなので無視
    if(/^※/.test(line)) continue;

    // # 見出し行の処理
    if(/^#\s+/.test(line)){
      var heading = line.replace(/^#\s+/, '').trim();

      // 前のモードの後処理
      if(mode === 'ing') flushPart();

      // # パート名: xxx （材料モード中の行）
      if(/^パート名[:：]/.test(heading)){
        // 直前の材料パートを確定してから新パートを開始
        flushPart();
        currentPartLabel = heading.replace(/^パート名[:：]\s*/, '').trim();
        // modeはingのまま
        continue;
      }

      // 各見出しに応じてモード切り替え
      if(heading === '料理名')   { mode = 'name';   continue; }
      if(heading === 'カテゴリ') { mode = 'cat';    continue; }
      if(heading === 'ジャンル') { mode = 'genre';  continue; }
      if(heading === '説明')     { mode = 'desc';   continue; }
      if(heading === '食材タグ') { mode = 'ings';   continue; }
      if(heading === 'URL')      { mode = 'url';    continue; }
      if(heading === '公開')     { mode = 'pub';    continue; }
      if(heading === '手順')     { mode = 'steps';  continue; }
      if(heading === '覚書')     { mode = 'memo';   continue; }
      if(heading === '材料')     { mode = 'ing'; currentPartLabel = ''; continue; }

      // 未知の見出しは無視
      mode = 'none';
      continue;
    }

    // 空行スキップ（手順・覚書内の空行は保持）
    if(line === ''){
      if(mode === 'steps') stepsLines.push('');
      if(mode === 'memo')  memoLines.push('');
      continue;
    }

    // モードに応じてコンテンツ行を処理
    if(mode === 'name')  { result.name  = line; mode = 'none'; continue; }
    if(mode === 'cat')   { result.cat   = line; mode = 'none'; continue; }
    if(mode === 'genre') { result.genre = line; mode = 'none'; continue; }
    if(mode === 'desc')  { result.desc  = line; mode = 'none'; continue; }
    if(mode === 'ings')  { result.ings  = line; mode = 'none'; continue; }
    if(mode === 'url')   { result.url   = line; mode = 'none'; continue; }
    if(mode === 'pub')   { result.pub   = /^(はい|yes|true|1)$/i.test(line); mode = 'none'; continue; }

    if(mode === 'ing'){
      // # パート名 の次の行が材料行
      var cols = line.split(/,|，/).map(function(s){ return s.trim(); });
      currentRows.push({
        name: cols[0] || '',
        amt:  cols[1] || '',
        note: cols[2] || ''
      });
      continue;
    }

    if(mode === 'steps'){ stepsLines.push(line); continue; }
    if(mode === 'memo') { memoLines.push(line);  continue; }
  }

  // 残りをフラッシュ
  flushPart();

  result.steps = stepsLines.join('\n').trim();
  result.memo  = memoLines.join('\n').trim();

  return result;
}
