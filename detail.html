
<!DOCTYPE html>
<html lang="ja">
  <!-- ～～～ detail.html ～～～ -->
  <!-- ～～～ 　260403　1355　 ～～～ -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍪 おかしなぺぇじ 🥐 - レシピ詳細</title>
  <link rel="icon" href="favicon.ico">

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      padding: 1.5rem;
      max-width: 760px;
      margin: 0 auto;
    }

    h1 { font-size: 22px; margin-bottom: 6px; }
    .tag { display:inline-block; padding:3px 8px; border-radius:999px; font-size:11px; margin-right:4px; }
    .t-cat { background:#FBEAF0; color:#72243E; }
    .t-ing { background:#FAEEDA; color:#633806; }
    .t-pub { background:#EAF3DE; color:#27500A; }
    .t-priv { background:#F1EFE8; color:#5F5E5A; }

    .section { margin-top: 1.4rem; }
    .section h3 {
      font-size: 13px;
      background:#FBEAF0;
      padding:4px 10px;
      border-radius:5px;
      display:inline-block;
      margin-bottom:6px;
    }

    .ing-part-label {
      font-size:12px;
      font-weight:500;
      color:#72243E;
      margin:10px 0 4px;
      background:#f0e0eb;
      padding:3px 10px;
      border-radius:5px;
      display:inline-block;
    }

    .ing-table {
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      margin-bottom:8px;
    }
    .ing-table td {
      padding:4px 6px;
      border-bottom:1px solid #f5f5f5;
    }

    #detailPhotos img {
      width:100px;
      height:78px;
      object-fit:cover;
      border-radius:8px;
      border:1px solid #ddd;
      margin-right:6px;
      margin-bottom:6px;
    }

    #editRecipeBtn {
      margin-top: 20px;
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid #D4537E;
      background: #fff;
      color: #D4537E;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <a href="index.html" style="color:#D4537E; font-size:13px; text-decoration:none;">← 一覧に戻る</a>

  <h1 id="detailTitle"></h1>

  <div id="detailCategory" class="tag t-cat"></div>

  <div id="detailDesc" class="section" style="display:none;">
    <h3>説明</h3>
    <p id="detailDesc"></p>
  </div>

  <div id="detailYield" class="section" style="display:none;">
    <h3>出来上がり量</h3>
    <p></p>
  </div>

  <div id="detailUrl" class="section" style="display:none;">
    <h3>参考レシピ</h3>
  </div>

  <div id="detailIngredients" class="section">
    <h3>材料</h3>
  </div>

  <div id="detailPhotos" class="section" style="display:none;">
    <h3>写真</h3>
  </div>

  <button id="editRecipeBtn" style="display:none;">編集</button>

  <script src="js/detail.js"></script>
</body>
</html>
